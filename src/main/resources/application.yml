spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://localhost:3306/notification_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

# Application specific configuration
notification:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLWRlbW8tc2VjcmV0LWtleS1mb3Itand0LXNpZ25pbmctcHVycG9zZXMtb25seQ==}
    expiration-ms: 86400000   # 24 hours

  dispatch:
    pool-size:
      email: 5
      sms: 5
      push: 5
      in_app: 5
    poll-interval-ms: 2000
    max-retries: 3
    backoff-base-ms: 1000
    backoff-multiplier: 2

  rate-limit:
    default-capacity-per-minute: 60
