spring:
  datasource:
    url: jdbc:h2:mem:notification_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

notification:
  jwt:
    secret: dGhpcy1pcy1hLXRlc3Qtc2VjcmV0LWtleS1mb3Itand0LXNpZ25pbmctcHVycG9zZXMtb25seQ==
    expiration-ms: 3600000
  dispatch:
    pool-size:
      email: 2
      sms: 2
      push: 2
      in_app: 2
    poll-interval-ms: 500
    max-retries: 3
    backoff-base-ms: 100
    backoff-multiplier: 2
  rate-limit:
    default-capacity-per-minute: 1000
